databases:
  - name: skillnode-db
    databaseName: skillnode
    user: skillnode
    plan: starter

services:
  - type: web
    name: skillnode-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install && npm run prisma:generate
    preDeployCommand: npm run prisma:push
    startCommand: npm start
    healthCheckPath: /healthz
    disk:
      name: uploads
      mountPath: /opt/render/project/src/server/uploads
      sizeGB: 10
    envVars:
      - key: APP_ENV
        value: production
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_APP_URLS
        sync: false
      - key: PUBLIC_APP_URL_REGEX
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: skillnode-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOW_DEV_LOGIN_CODE
        value: "false"
