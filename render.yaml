databases:
  - name: skillnode-postgres
    plan: free
    databaseName: skillnode
    user: skillnode

services:
  - type: web
    name: skillnode-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm run start:render
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skillnode-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_APP_URLS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOW_DEV_LOGIN_CODE
        value: "false"
